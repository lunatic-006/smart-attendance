<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Verifier - Smart Face App</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container" style="max-width: 600px; text-align: center;">
        <h1 id="welcomeText">Welcome</h1>
        <p>Please look at the camera to verify your attendance.</p>

        <div id="statusBox" class="status-box"></div>

        <div class="camera-container" style="display: none;">
            <video id="webcam" autoplay playsinline></video>
        </div>

        <button class="btn btn-secondary" onclick="logout()" style="margin-top: 1rem;">Log Out</button>

        <div style="margin-top: 2rem; padding: 1rem; background: #d1fae5; color: #065f46; border-radius: 6px; text-align: left; font-size: 0.9em;"
            id="periodicStatus">
            <strong>Session Active:</strong> Your attendance is being verified automatically in the background. Please ensure this tab is open or minimized while the module runs.
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="camera_capture.js"></script>
    <script>
        const API_URL = "http://localhost:8000/api";
        const studentId = localStorage.getItem('student_id');
        const studentName = localStorage.getItem('student_name');
        const targetLecturerId = localStorage.getItem('target_lecturer_id');

        let pingInterval;

        if (!studentId || !targetLecturerId) {
            window.location.href = 'index.html';
        }

        document.getElementById('welcomeText').innerText = `Welcome, ${studentName}`;

        function showStatus(message, isError = false) {
            const el = document.getElementById('statusBox');
            el.className = `status-box ${isError ? 'error' : 'success'}`;
            if (typeof message === 'object') {
                message = JSON.stringify(message);
            }
            el.innerHTML = message;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await startCamera('webcam');
            showStatus(`Camera initialized. Targeting active session for Lecturer: ${targetLecturerId}...`);
            
            // Execute the very first verification check automatically right after logging in
            verifyFrame();
            
            // Silently loop exactly every 60 seconds (1 minute interval)
            pingInterval = setInterval(verifyFrame, 60000);
        });

        async function verifyFrame() {
            const captured_image = captureBase64();
            if (!captured_image) {
                console.warn("Camera not ready for capture.");
                return;
            }

            try {
                // Using mark endpoint so it counts initially and validates safely
                const response = await axios.post(`${API_URL}/attendance/mark`, {
                    student_id: studentId,
                    target_lecturer_id: targetLecturerId,
                    captured_image
                });
                showStatus("Attendance status: Active and Verified.");
                console.log("Background Face Validation Success:", response.data);
            } catch (err) {
                console.error("Background Face Validation Failed:", err.response?.data || err.message);
                showStatus("Warning: Face missing or unrecognized. Ensure you are in frame.", true);
            }
        }

        function logout() {
            clearInterval(pingInterval);
            stopCamera();
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
