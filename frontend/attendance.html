<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Verifier - Smart Face App</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container" style="max-width: 600px; text-align: center;">
        <h1 id="welcomeText">Welcome</h1>
        <p>Please look at the camera to verify your attendance.</p>

        <div id="statusBox" class="status-box"></div>

        <div class="camera-container" style="margin-top: 1.5rem; margin-bottom: 1.5rem;">
            <video id="webcam" autoplay playsinline></video>
        </div>

        <button class="btn" id="btnVerify">Verify Attendance</button>
        <button class="btn btn-secondary" onclick="logout()" style="margin-left: 1rem;">Log Out</button>

        <div style="margin-top: 2rem; padding: 1rem; background: #FEF3C7; border-radius: 6px; text-align: left; font-size: 0.9em; display: none;"
            id="periodicStatus">
            <strong>Active Session:</strong> Do not close this tab. Periodic face checks occur every 2 minutes while
            class is in session.
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="camera_capture.js"></script>
    <script>
        const API_URL = "http://localhost:8000/api";
        const studentId = localStorage.getItem('student_id');
        const studentName = localStorage.getItem('student_name');

        let pingInterval;

        if (!studentId) {
            window.location.href = 'login.html';
        }

        document.getElementById('welcomeText').innerText = `Welcome, ${studentName}`;

        document.addEventListener('DOMContentLoaded', async () => {
            await startCamera('webcam');
        });

        function showStatus(message, isError = false) {
            const el = document.getElementById('statusBox');
            el.className = `status-box ${isError ? 'error' : 'success'}`;
            el.innerHTML = message;
        }

        document.getElementById('btnVerify').addEventListener('click', async () => {
            const captured_image = captureBase64();
            if (!captured_image) return showStatus("Camera error.", true);

            showStatus("Verifying face and IP...");

            try {
                const response = await axios.post(`${API_URL}/attendance/mark`, {
                    student_id: parseInt(studentId),
                    captured_image
                });
                showStatus(response.data.message);

                // Start periodic ping only after successful initial attendance
                document.getElementById('periodicStatus').style.display = 'block';
                document.getElementById('btnVerify').disabled = true;
                document.getElementById('btnVerify').innerText = "Attendance Initially Marked";

                startPeriodicPing();

            } catch (err) {
                showStatus(err.response?.data?.detail || "Verification failed.", true);
            }
        });

        function startPeriodicPing() {
            // Ping every 2 minutes (120,000 ms)
            pingInterval = setInterval(async () => {
                const img = captureBase64();
                if (!img) return; // If camera failed for a moment, skip

                try {
                    await axios.post(`${API_URL}/attendance/ping`, {
                        student_id: parseInt(studentId),
                        captured_image: img
                    });
                    console.log("Ping successful.");
                } catch (err) {
                    console.error("Ping failed:", err.response?.data || err.message);
                    // Could show an alert or notification here warning the student
                    showStatus("Warning: Periodic verification failed. Please stay in view.", true);
                }
            }, 120000);
        }

        function logout() {
            clearInterval(pingInterval);
            stopCamera();
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>

</html>
