<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Attendance - Smart Face App</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Real-time specific styles */
        .realtime-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }

        .video-box {
            position: relative;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #e5e7eb;
        }

        #webcam {
            width: 100%;
            height: auto;
            display: block;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        .face-overlay {
            position: absolute;
            border: 3px solid #10b981;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 4px;
        }

        .face-overlay.matched {
            border-color: #06b6d4;
            background: rgba(6, 182, 212, 0.2);
        }

        .face-overlay.unmatched {
            border-color: #f59e0b;
            background: rgba(245, 158, 11, 0.2);
        }

        .stats-box {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9em;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            font-weight: 600;
            color: #374151;
        }

        .stat-value {
            color: #1f2937;
            font-family: 'Courier New', monospace;
        }

        .confidence-bar {
            width: 100%;
            height: 20px;
            background: #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #ef4444, #f59e0b, #10b981);
            width: 0%;
            transition: width 0.3s ease;
        }

        .face-status {
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            font-weight: 600;
            margin: 10px 0;
        }

        .face-status.detected {
            background: #dcfce7;
            color: #166534;
        }

        .face-status.matched {
            background: #cffafe;
            color: #0c4a6e;
        }

        .face-status.unmatched {
            background: #fef3c7;
            color: #92400e;
        }

        .face-status.no-face {
            background: #fee2e2;
            color: #991b1b;
        }

        .control-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-secondary {
            background: #6b7280;
            color: white;
        }

        .btn-secondary:hover {
            background: #4b5563;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #3b82f6;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Real-Time Attendance Verification</h1>
        <p id="welcomeText">Loading...</p>

        <div class="realtime-container">
            <div class="video-box">
                <video id="webcam" autoplay playsinline></video>
                <canvas id="canvas"></canvas>
            </div>

            <div>
                <div id="faceStatus" class="face-status no-face">
                    <span id="statusText">Initializing camera...</span>
                </div>

                <div class="stats-box">
                    <div class="stat-row">
                        <span class="stat-label">Faces Detected:</span>
                        <span class="stat-value" id="facesDetected">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Matches Found:</span>
                        <span class="stat-value" id="matchesFound">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Frame Buffer:</span>
                        <span class="stat-value"><span id="bufferSize">0</span>/30</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Processing:</span>
                        <span class="stat-value">
                            <span id="processingTime">0</span>ms
                        </span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Confidence:</span>
                        <div class="confidence-bar">
                            <div class="confidence-fill" id="confidenceFill"></div>
                        </div>
                        <span class="stat-value" id="confidenceValue">-</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">FPS:</span>
                        <span class="stat-value" id="fps">30</span>
                    </div>
                </div>

                <div class="control-buttons">
                    <button class="btn-primary" onclick="toggleCapture()">
                        <span id="captureButtonText">Start Capture</span>
                    </button>
                    <button class="btn-secondary" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>

        <div id="alertBox" class="status-box" style="margin-top: 20px; display: none;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="camera_capture.js"></script>
    <script>
        const API_URL = "http://localhost:8000/api";
        const studentId = localStorage.getItem('student_id');
        const studentName = localStorage.getItem('student_name');
        const targetLecturerId = localStorage.getItem('target_lecturer_id');

        let isCapturing = false;
        let captureInterval = null;
        let statsUpdateInterval = null;
        let frameCount = 0;
        let lastFpsUpdate = Date.now();

        // Initialize
        if (!studentId) {
            window.location.href = 'index.html';
        }

        document.getElementById('welcomeText').innerText = `Welcome, ${studentName}!`;

        document.addEventListener('DOMContentLoaded', async () => {
            await startCamera('webcam');
            showStatus("Camera initialized. Ready for real-time recognition.", false);
            
            // Initialize real-time session
            await initializeRealtimeSession();
        });

        async function initializeRealtimeSession() {
            try {
                const response = await axios.post(`${API_URL}/realtime/start-session`, null, {
                    params: {
                        student_id: studentId,
                        target_lecturer_id: targetLecturerId
                    }
                });
                
                console.log("Session initialized:", response.data);
                showStatus("Session active. Press 'Start Capture' to begin.", false);
            } catch (err) {
                console.error("Session init failed:", err);
                showStatus("Failed to initialize session: " + err.response?.data?.detail, true);
            }
        }

        async function toggleCapture() {
            if (isCapturing) {
                stopCapture();
            } else {
                startCapture();
            }
        }

        function startCapture() {
            isCapturing = true;
            document.getElementById('captureButtonText').innerText = 'Stop Capture';
            
            // Continuous frame capture: every 66ms ≈ 15 FPS
            captureInterval = setInterval(() => {
                captureAndSend();
            }, 66);
            
            // Process queued frames every 500ms
            captureInterval = setInterval(() => {
                processQueuedFrames();
            }, 500);
            
            // Update stats every 1 second
            statsUpdateInterval = setInterval(() => {
                updateStats();
            }, 1000);
            
            showStatus("Capturing frames...<br><span class='loading'></span>", false);
        }

        function stopCapture() {
            isCapturing = false;
            clearInterval(captureInterval);
            clearInterval(statsUpdateInterval);
            document.getElementById('captureButtonText').innerText = 'Start Capture';
            showStatus("Capture stopped.", false);
        }

        async function captureAndSend() {
            if (!isCapturing) return;
            
            try {
                const captured_image = captureBase64();
                if (!captured_image) return;
                
                frameCount++;
                
                // Send to real-time queue (non-blocking)
                const response = await axios.post(`${API_URL}/realtime/add-frame`, null, {
                    params: {
                        student_id: studentId,
                        target_lecturer_id: targetLecturerId,
                        base64_image: captured_image
                    }
                });
                
                if (response.data.status === "queued") {
                    updateBufferSize(response.data.buffer_size);
                }
            } catch (err) {
                console.error("Error sending frame:", err.message);
            }
        }

        async function processQueuedFrames() {
            if (!isCapturing) return;
            
            try {
                const response = await axios.post(`${API_URL}/realtime/process-queue`, null, {
                    params: {
                        student_id: studentId,
                        target_lecturer_id: targetLecturerId
                    }
                });
                
                const data = response.data;
                
                if (data.detections_processed > 0) {
                    handleDetections(data.detections);
                    updatePerformanceStats(data.performance_stats);
                }
            } catch (err) {
                console.error("Error processing frames:", err.message);
            }
        }

        function handleDetections(detections) {
            if (detections.length === 0) {
                updateFaceStatus("no-face", "No face detected");
                return;
            }
            
            const lastDetection = detections[detections.length - 1];
            
            if (lastDetection.detection_count > 0) {
                updateFaceStatus("detected", "Face detected");
                document.getElementById('facesDetected').innerText = lastDetection.detection_count;
                
                // Update processing time
                const procTime = (lastDetection.processing_time * 1000).toFixed(1);
                document.getElementById('processingTime').innerText = procTime;
            } else {
                updateFaceStatus("no-face", "No face detected");
            }
        }

        function updateFaceStatus(status, text) {
            const statusEl = document.getElementById('faceStatus');
            statusEl.className = `face-status ${status}`;
            document.getElementById('statusText').innerHTML = text;
        }

        function updateBufferSize(size) {
            document.getElementById('bufferSize').innerText = size;
        }

        function updatePerformanceStats(stats) {
            if (stats) {
                document.getElementById('facesDetected').innerText = stats.faces_detected || 0;
                document.getElementById('matchesFound').innerText = stats.matches_found || 0;
                
                // Update FPS
                const now = Date.now();
                if (now - lastFpsUpdate >= 1000) {
                    document.getElementById('fps').innerText = frameCount;
                    frameCount = 0;
                    lastFpsUpdate = now;
                }
            }
        }

        async function updateStats() {
            try {
                const response = await axios.get(`${API_URL}/realtime/stats`, {
                    params: {
                        student_id: studentId,
                        target_lecturer_id: targetLecturerId
                    }
                });
                
                if (response.data.status === "success") {
                    updatePerformanceStats(response.data.stats);
                    updateBufferSize(response.data.buffer_size);
                }
            } catch (err) {
                console.error("Error updating stats:", err.message);
            }
        }

        function showStatus(message, isError = false) {
            const el = document.getElementById('alertBox');
            el.className = `status-box ${isError ? 'error' : 'success'}`;
            el.innerHTML = message;
            el.style.display = 'block';
        }

        function logout() {
            stopCapture();
            stopCamera();
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            stopCapture();
            stopCamera();
        });
    </script>
</body>

</html>
