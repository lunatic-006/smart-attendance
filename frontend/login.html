<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Smart Face Attendance</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-card {
            max-width: 400px;
            margin: 4rem auto;
        }
    </style>
</head>

<body>
    <div class="container login-card">
        <h1 style="text-align: center;">System Login</h1>

        <div id="statusBox" class="status-box"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="button" class="btn" id="btnLogin" style="width: 100%;">Log In</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem;"><a href="register.html">Need an account? Register here.</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const API_URL = "http://localhost:8000/api";

        function showStatus(message, isError = false) {
            const el = document.getElementById('statusBox');
            el.className = `status-box ${isError ? 'error' : 'success'}`;
            el.innerHTML = message;
        }

        document.getElementById('btnLogin').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                return showStatus("Fill all fields.", true);
            }

            try {
                const response = await axios.post(`${API_URL}/login/student?email=${encodeURIComponent(email)}&password_hash=${encodeURIComponent(password)}`);
                localStorage.setItem('student_id', response.data.student_id);
                localStorage.setItem('student_name', response.data.name);
                window.location.href = 'attendance.html';
            } catch (err) {
                showStatus(err.response?.data?.detail || "Login failed.", true);
            }
        });
    </script>
</body>

</html>
